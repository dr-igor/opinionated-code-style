name: Publish TypeScript package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Read package version
        id: pkg
        run: |
          version="$(node -p "require('./package.json').version")"
          name="$(node -p "require('./package.json').name")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Pack tarball
        id: pack
        run: |
          tarball="$(npm pack --json | node -p "JSON.parse(require('fs').readFileSync(0)).at(0).filename")"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: typescript-v${{ steps.pkg.outputs.version }}
          PKG_NAME: ${{ steps.pkg.outputs.name }}
          PKG_VERSION: ${{ steps.pkg.outputs.version }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Bump the version in typescript/package.json before publishing." >&2
            exit 1
          fi
          gh release create "$TAG" "$TARBALL" \
            --title "$PKG_NAME v$PKG_VERSION" \
            --notes "Install with: npm i https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${TARBALL}"
